            <font face="宋体" size="3">
              <p>自2026年4月30日23时起，小岛大区正式成为HbzLz下辖的一个行政区。该区即日起更名为「台北区」，并采用「粉天白日旗」作为区旗。</p>
              <p>本次调整范围包括：</p>
              <p>· 原违章台北区全部区域；<br>
              · 某建筑大赛相关建筑物。</p>
              <p>此外，原本经填海造陆形成的违章台北区将全面改造为平台式结构，不再保留原有违章建筑形态，纳入台北区统一管理。</p>
              <p align="right">特此公告。</p>
